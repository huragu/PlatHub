<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spotifyにログイン中… — MIXCAST</title>
<style>
  html, body {
    margin: 0; height: 100%;
    background: #0D0D14; color: #F5F5F0;
    font-family: -apple-system, "Segoe UI", Inter, sans-serif;
    display: flex; align-items: center; justify-content: center;
  }
  .box { text-align: center; padding: 24px; max-width: 360px; }
  .spinner {
    width: 36px; height: 36px; margin: 0 auto 20px;
    border: 3px solid #2a2a3a; border-top-color: #E94560;
    border-radius: 50%; animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  h1 { font-size: 16px; font-weight: 600; margin: 0 0 8px; }
  p { font-size: 13px; color: #888; margin: 0; line-height: 1.6; }
  .error { color: #ff7090; }
  a { color: #E94560; }
</style>
</head>
<body>
  <div class="box">
    <div class="spinner" id="spinner"></div>
    <h1 id="statusTitle">Spotifyにログイン中…</h1>
    <p id="statusMsg">少々お待ちください</p>
  </div>

  <script src="js/spotify-auth.js"></script>
  <script>
    (async () => {
      const titleEl = document.getElementById("statusTitle");
      const msgEl = document.getElementById("statusMsg");
      const spinnerEl = document.getElementById("spinner");
      try {
        await SpotifyAuth.handleCallback();
        titleEl.textContent = "ログインしました";
        msgEl.textContent = "アプリに戻ります…";
        spinnerEl.style.display = "none";
        setTimeout(() => {
          window.location.href = "index.html";
        }, 600);
      } catch (e) {
        spinnerEl.style.display = "none";
        titleEl.textContent = "ログインに失敗しました";
        titleEl.classList.add("error");
        msgEl.textContent = e.message || "不明なエラーが発生しました";
        const link = document.createElement("p");
        link.style.marginTop = "16px";
        link.innerHTML = '<a href="index.html">アプリに戻る</a>';
        document.querySelector(".box").appendChild(link);
      }
    })();
  </script>
</body>
</html>
