<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="referrer" content="strict-origin-when-cross-origin">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PlatHub — ポップアウト</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    background: #0D0D14;
    color: #F5F5F0;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    height: 100%;
    overflow: hidden;
  }
  #container {
    display: flex;
    flex-direction: column;
    height: 100vh;
  }
  #header {
    padding: 8px 12px;
    font-size: 12px;
    color: #888;
    display: flex;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
    border-bottom: 1px solid #1e1e2a;
  }
  #header .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: #E94560;
    flex-shrink: 0;
  }
  #playerHost {
    flex: 1;
    width: 100%;
    background: #000;
  }
  #playerHost iframe { width: 100%; height: 100%; border: none; }
  #status {
    padding: 8px 12px;
    font-size: 11px;
    color: #555;
    text-align: center;
    flex-shrink: 0;
  }
</style>
</head>
<body>

<div id="container">
  <div id="header">
    <span class="dot"></span>
    <span>PlatHub ポップアウト再生 — このウィンドウを開いたままにすると、メインタブがバックグラウンドでも再生が続きやすくなります</span>
  </div>
  <div id="playerHost"></div>
  <div id="status">読み込み中…</div>
</div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
(() => {
  "use strict";

  const params = new URLSearchParams(window.location.search);
  const videoId = params.get("v");
  const startSeconds = parseFloat(params.get("t") || "0") || 0;
  const initialVolume = Math.min(1, Math.max(0, parseFloat(params.get("vol") || "1")));
  const title = params.get("title") || "";

  const statusEl = document.getElementById("status");

  if (title) {
    document.title = `▶ ${title} — PlatHub`;
  }
  if (!videoId) {
    statusEl.textContent = "動画情報が見つかりませんでした。このウィンドウは閉じてください。";
  }

  let player = null;
  let ready = false;

  function post(type, extra) {
    try {
      if (window.opener && !window.opener.closed) {
        window.opener.postMessage({ source: "plathub-popout", type, ...extra }, window.location.origin);
      }
    } catch (_) {}
  }

  window.onYouTubeIframeAPIReady = () => {
    if (!videoId) return;
    player = new YT.Player("playerHost", {
      videoId,
      playerVars: {
        autoplay: 1,
        controls: 1,       // native YouTube controls — this window has no custom UI of its own
        rel: 0,
        playsinline: 1,
        origin: window.location.origin,
      },
      events: {
        onReady(e) {
          ready = true;
          try { e.target.setVolume(Math.round(initialVolume * 100)); } catch (_) {}
          if (startSeconds > 0) {
            try { e.target.seekTo(startSeconds, true); } catch (_) {}
          }
          try { e.target.playVideo(); } catch (_) {}
          try {
            const iframeEl = e.target.getIframe?.();
            if (iframeEl) {
              iframeEl.allow = "autoplay; encrypted-media; picture-in-picture";
              iframeEl.referrerPolicy = "strict-origin-when-cross-origin";
            }
          } catch (_) {}
          statusEl.textContent = "このウィンドウを開いたままにしてください。閉じるとメイン画面に戻ります。";
          post("ready", {});
        },
        onStateChange(e) {
          if (e.data === YT.PlayerState.ENDED) {
            post("ended", {});
          }
        },
        onError(e) {
          statusEl.textContent = `再生エラーが発生しました（コード ${e.data}）`;
          post("error", { code: e.data });
        },
      },
    });
  };

  // Periodically report position back to the opener, so the main window
  // can resume from the right spot if the user closes this popout window
  // or switches back to controlling playback from the main UI.
  setInterval(() => {
    if (!ready || !player) return;
    try {
      post("position", {
        position: player.getCurrentTime() || 0,
        duration: player.getDuration() || 0,
        playing: player.getPlayerState() === YT.PlayerState.PLAYING,
      });
    } catch (_) {}
  }, 1000);

  window.addEventListener("beforeunload", () => {
    let position = 0;
    try { position = player ? (player.getCurrentTime() || 0) : 0; } catch (_) {}
    post("closed", { position });
  });
})();
</script>
</body>
</html>
