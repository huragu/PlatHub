<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="referrer" content="strict-origin-when-cross-origin">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PlatHub — ポップアウト</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<style>
  :root {
    --bg: #0D0D14;
    --red: #E94560;
    --red-dim: #E9456044;
    --text: #F5F5F0;
    --text-dim: #888888;
    --text-faint: #555555;
    --border: #1e1e2a;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    height: 100%;
    overflow: hidden;
    user-select: none;
  }
  #container {
    display: flex;
    flex-direction: column;
    height: 100vh;
    padding: 16px 18px;
  }
  #header {
    font-size: 10px;
    color: var(--text-faint);
    display: flex;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
    margin-bottom: 14px;
  }
  #header .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--red);
    flex-shrink: 0;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:.4;} }

  #trackInfo {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    min-height: 0;
    padding: 0 4px;
    margin-top: 12px;
  }
  #trackBadge {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: .04em;
    color: var(--red);
    background: var(--red-dim);
    border: 1px solid #E9456055;
    border-radius: 4px;
    padding: 2px 8px;
    margin-bottom: 10px;
  }
  #trackTitle {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 16px;
    font-weight: 700;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 100%;
  }
  #trackArtist {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 100%;
  }

  #progressRow {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
    margin-top: 14px;
  }
  #progressRow span {
    font-size: 10px;
    color: var(--text-faint);
    min-width: 32px;
    text-align: center;
    flex-shrink: 0;
  }
  input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    flex: 1;
    height: 4px;
    border-radius: 2px;
    background: #2a2a3a;
    cursor: pointer;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 12px; height: 12px;
    border-radius: 50%;
    background: var(--red);
    cursor: pointer;
  }
  input[type="range"]::-moz-range-thumb {
    width: 12px; height: 12px; border: none;
    border-radius: 50%;
    background: var(--red);
    cursor: pointer;
  }
  #progressSlider { background: linear-gradient(to right, var(--red) 0%, var(--red) 0%, #2a2a3a 0%); }

  #controlsRow {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    flex-shrink: 0;
    margin-top: 14px;
  }
  .ctrl-btn {
    background: none;
    border: none;
    color: var(--text);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 6px;
    opacity: 0.85;
    transition: opacity .15s, transform .1s;
  }
  .ctrl-btn:hover { opacity: 1; }
  .ctrl-btn:active { transform: scale(0.92); }
  .ctrl-btn svg { width: 20px; height: 20px; }
  #playPauseBtn {
    background: var(--red);
    border-radius: 50%;
    width: 44px; height: 44px;
    opacity: 1;
  }
  #playPauseBtn svg { width: 20px; height: 20px; }

  #volumeRow {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
    margin-top: 14px;
  }
  #volumeRow svg { width: 15px; height: 15px; color: var(--text-faint); flex-shrink: 0; }
  #volumeSlider { flex: 1; }

  #playerHost {
    width: 100%;
    aspect-ratio: 16/9;
    border-radius: 10px;
    overflow: hidden;
    background: #000;
    flex-shrink: 0;
  }
  #playerHost iframe { width: 100%; height: 100%; border: none; }
  #status {
    font-size: 10px;
    color: var(--text-faint);
    text-align: center;
    margin-top: 10px;
    flex-shrink: 0;
    min-height: 12px;
  }
</style>
</head>
<body>

<div id="container">
  <div id="header">
    <span class="dot"></span>
    <span>PlatHub ポップアウト再生中</span>
  </div>

  <div id="playerHost"></div>

  <div id="trackInfo">
    <div id="trackBadge">YouTube</div>
    <div id="trackTitle">読み込み中…</div>
    <div id="trackArtist"></div>
  </div>

  <div id="progressRow">
    <span id="curTime">0:00</span>
    <input type="range" id="progressSlider" min="0" max="1000" value="0">
    <span id="durTime">0:00</span>
  </div>

  <div id="controlsRow">
    <button class="ctrl-btn" id="prevBtn" title="前のトラック">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
    </button>
    <button class="ctrl-btn" id="playPauseBtn" title="再生/一時停止">
      <svg id="playIcon" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
    </button>
    <button class="ctrl-btn" id="nextBtn" title="次のトラック">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M16 6h2v12h-2zM6 6l8.5 6L6 18z"/></svg>
    </button>
  </div>

  <div id="volumeRow">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 10v4h4l5 5V5L7 10H3zm13.5 2A4.5 4.5 0 0 0 14 7.97v8.05A4.5 4.5 0 0 0 16.5 12z"/></svg>
    <input type="range" id="volumeSlider" min="0" max="100" value="80">
  </div>

  <div id="status">読み込み中…</div>
</div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
(() => {
  "use strict";

  const params = new URLSearchParams(window.location.search);
  const videoId = params.get("v");
  const startSeconds = parseFloat(params.get("t") || "0") || 0;
  const initialVolume = Math.min(1, Math.max(0, parseFloat(params.get("vol") || "1")));
  let title = params.get("title") || "";
  let artist = params.get("artist") || "";

  const statusEl = document.getElementById("status");
  const titleEl = document.getElementById("trackTitle");
  const artistEl = document.getElementById("trackArtist");
  const progressSlider = document.getElementById("progressSlider");
  const curTimeEl = document.getElementById("curTime");
  const durTimeEl = document.getElementById("durTime");
  const playPauseBtn = document.getElementById("playPauseBtn");
  const playIcon = document.getElementById("playIcon");
  const volumeSlider = document.getElementById("volumeSlider");
  const prevBtn = document.getElementById("prevBtn");
  const nextBtn = document.getElementById("nextBtn");

  const ICON_PLAY = '<path d="M8 5v14l11-7z"/>';
  const ICON_PAUSE = '<path d="M6 5h4v14H6zm8 0h4v14h-4z"/>';

  function formatTime(s) {
    if (!s || isNaN(s) || s < 0) return "0:00";
    const m = Math.floor(s / 60);
    const sec = Math.floor(s % 60).toString().padStart(2, "0");
    return `${m}:${sec}`;
  }

  function setTitle(t) {
    title = t;
    titleEl.textContent = t || "";
    document.title = t ? `▶ ${t} — PlatHub` : "PlatHub — ポップアウト";
  }
  function setArtist(a) {
    artist = a;
    artistEl.textContent = a || "";
  }
  setTitle(title);
  setArtist(artist);

  if (!videoId) {
    statusEl.textContent = "動画情報が見つかりませんでした。このウィンドウは閉じてください。";
  }

  let player = null;
  let ready = false;
  let seeking = false;      // true while the user is dragging the progress handle
  let lastDuration = 0;

  function post(type, extra) {
    try {
      if (window.opener && !window.opener.closed) {
        window.opener.postMessage({ source: "plathub-popout", type, ...extra }, window.location.origin);
      }
    } catch (_) {}
  }

  function updatePlayIcon(isPlaying) {
    playIcon.innerHTML = isPlaying ? ICON_PAUSE : ICON_PLAY;
  }

  window.onYouTubeIframeAPIReady = () => {
    if (!videoId) return;

    // Build the <iframe> ourselves (referrerpolicy/allow set before
    // insertion — setting them after onReady is too late).
    const p = new URLSearchParams({
      enablejsapi: "1",
      autoplay: "1",
      controls: "0",
      rel: "0",
      playsinline: "1",
      origin: window.location.origin,
    });
    const iframeEl = document.createElement("iframe");
    iframeEl.src = `https://www.youtube.com/embed/${videoId}?${p.toString()}`;
    iframeEl.width = "100%";
    iframeEl.height = "100%";
    iframeEl.frameBorder = "0";
    iframeEl.allow = "autoplay; encrypted-media; picture-in-picture";
    iframeEl.setAttribute("referrerpolicy", "strict-origin-when-cross-origin");
    document.getElementById("playerHost").appendChild(iframeEl);

    player = new YT.Player(iframeEl, {
      events: {
        onReady(e) {
          ready = true;
          try { e.target.setVolume(Math.round(initialVolume * 100)); } catch (_) {}
          volumeSlider.value = Math.round(initialVolume * 100);
          if (startSeconds > 0) {
            try { e.target.seekTo(startSeconds, true); } catch (_) {}
          }
          try { e.target.playVideo(); } catch (_) {}
          statusEl.textContent = "";
          post("ready", {});
        },
        onStateChange(e) {
          const isPlaying = e.data === YT.PlayerState.PLAYING;
          updatePlayIcon(isPlaying);
          if (e.data === YT.PlayerState.ENDED) {
            post("ended", {});
          }
        },
        onError(e) {
          statusEl.textContent = `再生エラーが発生しました（コード ${e.data}）`;
          post("error", { code: e.data });
        },
      },
    });
  };

  /* ── User-facing controls (act on the LOCAL player directly) ── */
  playPauseBtn.addEventListener("click", () => {
    if (!ready || !player) return;
    try {
      if (player.getPlayerState() === YT.PlayerState.PLAYING) player.pauseVideo();
      else player.playVideo();
    } catch (_) {}
  });

  volumeSlider.addEventListener("input", () => {
    if (!ready || !player) return;
    try { player.setVolume(+volumeSlider.value); } catch (_) {}
  });

  progressSlider.addEventListener("input", () => {
    seeking = true;
    const pct = +progressSlider.value / 1000;
    curTimeEl.textContent = formatTime(pct * lastDuration);
    progressSlider.style.background =
      `linear-gradient(to right, var(--red) ${pct * 100}%, #2a2a3a ${pct * 100}%)`;
  });
  progressSlider.addEventListener("change", () => {
    if (ready && player && lastDuration > 0) {
      const pct = +progressSlider.value / 1000;
      try { player.seekTo(pct * lastDuration, true); } catch (_) {}
    }
    seeking = false;
  });

  /* ── Next/Prev: playlist order (shuffle/repeat/radio) lives in the
     main window, so ask it what should play and let it drive us via
     the same 'loadTrack'/'seekLocal' messages used for auto-advance. ── */
  nextBtn.addEventListener("click", () => post("requestNext", {}));
  prevBtn.addEventListener("click", () => {
    let pos = 0;
    try { pos = player ? (player.getCurrentTime() || 0) : 0; } catch (_) {}
    post("requestPrev", { position: pos });
  });

  /* ── Progress + position reporting loop ── */
  setInterval(() => {
    if (!ready || !player) return;
    let pos = 0, dur = 0, isPlaying = false;
    try {
      pos = player.getCurrentTime() || 0;
      dur = player.getDuration() || 0;
      isPlaying = player.getPlayerState() === YT.PlayerState.PLAYING;
    } catch (_) { return; }

    lastDuration = dur;
    if (!seeking) {
      const pct = dur > 0 ? (pos / dur) * 1000 : 0;
      progressSlider.value = pct;
      progressSlider.style.background =
        `linear-gradient(to right, var(--red) ${pct / 10}%, #2a2a3a ${pct / 10}%)`;
      curTimeEl.textContent = formatTime(pos);
    }
    durTimeEl.textContent = formatTime(dur);
    updatePlayIcon(isPlaying);

    post("position", { position: pos, duration: dur, playing: isPlaying });
  }, 500);

  window.addEventListener("beforeunload", () => {
    let position = 0;
    try { position = player ? (player.getCurrentTime() || 0) : 0; } catch (_) {}
    post("closed", { position });
  });

  /* ── Commands from the main window ── */
  window.addEventListener("message", (e) => {
    if (e.origin !== window.location.origin) return;
    const data = e.data;
    if (!data || data.source !== "plathub-main") return;

    if (data.type === "loadTrack" && player) {
      try {
        player.loadVideoById(data.videoId);
        if (typeof data.volume === "number") {
          player.setVolume(Math.round(data.volume * 100));
          volumeSlider.value = Math.round(data.volume * 100);
        }
      } catch (_) {}
      setTitle(data.title || "");
      setArtist(data.artist || "");
    } else if (data.type === "seekLocal" && player) {
      // "Restart current track" case for requestPrev (position was
      // already > a few seconds, so the main window just wants a
      // restart rather than a genuine previous-track change).
      try { player.seekTo(0, true); } catch (_) {}
    }
  });
})();
</script>
</body>
</html>
