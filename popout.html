<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="referrer" content="strict-origin-when-cross-origin">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PlatHub — ポップアウト</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<style>
  :root {
    --bg: #0D0D14;
    --red: #E94560;
    --red-dim: #E9456044;
    --text: #F5F5F0;
    --text-dim: #888888;
    --text-faint: #555555;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    height: 100%;
    overflow: hidden;
    user-select: none;
  }
  #container {
    display: flex;
    flex-direction: column;
    height: 100vh;
    padding: 16px 18px;
  }
  #header {
    font-size: 10px;
    color: var(--text-faint);
    display: flex;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
    margin-bottom: 12px;
  }
  #header .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--red);
    flex-shrink: 0;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:.4;} }

  #playerHost {
    width: 100%;
    aspect-ratio: 16/9;
    border-radius: 10px;
    overflow: hidden;
    background: #000;
    flex-shrink: 0;
  }
  #playerHost iframe { width: 100%; height: 100%; border: none; }
  #playerHost[hidden] { display: none; }

  #trackInfo {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    min-height: 0;
    padding: 0 4px;
  }
  #playerHost:not([hidden]) + #trackInfo { flex: 0 0 auto; margin-top: 12px; }
  #trackBadge {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: .04em;
    color: var(--red);
    background: var(--red-dim);
    border: 1px solid #E9456055;
    border-radius: 4px;
    padding: 2px 8px;
    margin-bottom: 10px;
  }
  #trackTitle {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 16px;
    font-weight: 700;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 100%;
  }
  #trackArtist {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 100%;
  }

  #progressRow {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
    margin-top: 14px;
  }
  #progressRow span {
    font-size: 10px;
    color: var(--text-faint);
    min-width: 32px;
    text-align: center;
    flex-shrink: 0;
  }
  input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    flex: 1;
    height: 4px;
    border-radius: 2px;
    background: #2a2a3a;
    cursor: pointer;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 12px; height: 12px;
    border-radius: 50%;
    background: var(--red);
    cursor: pointer;
  }
  input[type="range"]::-moz-range-thumb {
    width: 12px; height: 12px; border: none;
    border-radius: 50%;
    background: var(--red);
    cursor: pointer;
  }
  #progressSlider { background: linear-gradient(to right, var(--red) 0%, var(--red) 0%, #2a2a3a 0%); }

  #controlsRow {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    flex-shrink: 0;
    margin-top: 14px;
  }
  .ctrl-btn {
    background: none;
    border: none;
    color: var(--text);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 6px;
    opacity: 0.85;
    transition: opacity .15s, transform .1s;
  }
  .ctrl-btn:hover { opacity: 1; }
  .ctrl-btn:active { transform: scale(0.92); }
  .ctrl-btn svg { width: 20px; height: 20px; }
  #playPauseBtn {
    background: var(--red);
    border-radius: 50%;
    width: 44px; height: 44px;
    opacity: 1;
  }
  #playPauseBtn svg { width: 20px; height: 20px; }

  #volumeRow {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
    margin-top: 14px;
  }
  #volumeRow svg { width: 15px; height: 15px; color: var(--text-faint); flex-shrink: 0; }
  #volumeSlider { flex: 1; }

  #status {
    font-size: 10px;
    color: var(--text-faint);
    text-align: center;
    margin-top: 10px;
    flex-shrink: 0;
    min-height: 12px;
  }
</style>
</head>
<body>

<div id="container">
  <div id="header">
    <span class="dot"></span>
    <span id="headerText">PlatHub ポップアウト再生中</span>
  </div>

  <div id="playerHost" hidden></div>

  <div id="trackInfo">
    <div id="trackBadge">—</div>
    <div id="trackTitle">読み込み中…</div>
    <div id="trackArtist"></div>
  </div>

  <div id="progressRow">
    <span id="curTime">0:00</span>
    <input type="range" id="progressSlider" min="0" max="1000" value="0">
    <span id="durTime">0:00</span>
  </div>

  <div id="controlsRow">
    <button class="ctrl-btn" id="prevBtn" title="前のトラック">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
    </button>
    <button class="ctrl-btn" id="playPauseBtn" title="再生/一時停止">
      <svg id="playIcon" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
    </button>
    <button class="ctrl-btn" id="nextBtn" title="次のトラック">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M16 6h2v12h-2zM6 6l8.5 6L6 18z"/></svg>
    </button>
  </div>

  <div id="volumeRow">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 10v4h4l5 5V5L7 10H3zm13.5 2A4.5 4.5 0 0 0 14 7.97v8.05A4.5 4.5 0 0 0 16.5 12z"/></svg>
    <input type="range" id="volumeSlider" min="0" max="100" value="80">
  </div>

  <div id="status"></div>
</div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
(() => {
  "use strict";

  /* ════════════════════════════════════════════
     Unified popout: hosts YouTube playback locally when the current
     track is YouTube, and acts as a pure remote-control (relaying
     commands, audio stays in the main window) for everything else.
     The window itself NEVER closes/reopens when the track's service
     changes — only its internal mode switches, on a message from the
     main window. This keeps the window's on-screen position stable
     and avoids any "disappears and reappears" flicker.
  ════════════════════════════════════════════ */

  const params = new URLSearchParams(window.location.search);
  let mode = params.get("service") === "youtube" ? "youtube" : "remote";

  let title = params.get("title") || "";
  let artist = params.get("artist") || "";
  let badge = params.get("badge") || "";
  let duration = parseFloat(params.get("duration") || "0") || 0;
  let position = parseFloat(params.get("position") || "0") || 0;
  let playingRemote = params.get("playing") === "1"; // only meaningful in remote mode
  const initialVolume = Math.min(1, Math.max(0, parseFloat(params.get("vol") || "1")));

  const headerText = document.getElementById("headerText");
  const playerHostEl = document.getElementById("playerHost");
  const titleEl = document.getElementById("trackTitle");
  const artistEl = document.getElementById("trackArtist");
  const badgeEl = document.getElementById("trackBadge");
  const progressSlider = document.getElementById("progressSlider");
  const curTimeEl = document.getElementById("curTime");
  const durTimeEl = document.getElementById("durTime");
  const playPauseBtn = document.getElementById("playPauseBtn");
  const playIcon = document.getElementById("playIcon");
  const volumeSlider = document.getElementById("volumeSlider");
  const prevBtn = document.getElementById("prevBtn");
  const nextBtn = document.getElementById("nextBtn");
  const statusEl = document.getElementById("status");

  const ICON_PLAY = '<path d="M8 5v14l11-7z"/>';
  const ICON_PAUSE = '<path d="M6 5h4v14H6zm8 0h4v14h-4z"/>';

  function formatTime(s) {
    if (!s || isNaN(s) || s < 0) return "0:00";
    const m = Math.floor(s / 60);
    const sec = Math.floor(s % 60).toString().padStart(2, "0");
    return `${m}:${sec}`;
  }
  function post(type, extra) {
    try {
      if (window.opener && !window.opener.closed) {
        window.opener.postMessage({ source: "plathub-popout", type, ...extra }, window.location.origin);
      }
    } catch (_) {}
  }
  function setTitle(t) {
    title = t;
    titleEl.textContent = t || "";
    document.title = t ? `▶ ${t} — PlatHub` : "PlatHub — ポップアウト";
  }
  function setArtist(a) { artist = a; artistEl.textContent = a || ""; }
  function setBadge(b) { badge = b; badgeEl.textContent = b || ""; }
  function updatePlayIcon(isPlaying) { playIcon.innerHTML = isPlaying ? ICON_PAUSE : ICON_PLAY; }

  let seeking = false;
  function renderProgress(pos, dur) {
    const pct = dur > 0 ? (pos / dur) * 1000 : 0;
    progressSlider.value = pct;
    progressSlider.style.background =
      `linear-gradient(to right, var(--red) ${pct / 10}%, #2a2a3a ${pct / 10}%)`;
    curTimeEl.textContent = formatTime(pos);
    durTimeEl.textContent = formatTime(dur);
  }

  setTitle(title); setArtist(artist); setBadge(badge);
  volumeSlider.value = Math.round(initialVolume * 100);
  renderProgress(position, duration);

  /* ════════════════════════════════════════════
     YouTube hosting mode — a local YT.Player, created lazily the first
     time we ever need it (either at startup if we start in youtube
     mode, or later if the main window switches us into it).
  ════════════════════════════════════════════ */
  let player = null;
  let apiReady = false;
  let pendingEnterYoutube = null; // {videoId, ...} queued if API isn't ready yet

  window.onYouTubeIframeAPIReady = () => {
    apiReady = true;
    if (pendingEnterYoutube) {
      const args = pendingEnterYoutube;
      pendingEnterYoutube = null;
      reallyEnterYoutube(args);
    }
  };

  function reallyEnterYoutube({ videoId, autoplayNow, seekSeconds, vol }) {
    const p = new URLSearchParams({
      enablejsapi: "1",
      autoplay: autoplayNow ? "1" : "0",
      controls: "0",
      rel: "0",
      playsinline: "1",
      origin: window.location.origin,
    });
    const iframeEl = document.createElement("iframe");
    iframeEl.src = `https://www.youtube.com/embed/${videoId}?${p.toString()}`;
    iframeEl.width = "100%";
    iframeEl.height = "100%";
    iframeEl.frameBorder = "0";
    iframeEl.allow = "autoplay; encrypted-media; picture-in-picture";
    iframeEl.setAttribute("referrerpolicy", "strict-origin-when-cross-origin");
    playerHostEl.innerHTML = "";
    playerHostEl.appendChild(iframeEl);

    player = new YT.Player(iframeEl, {
      events: {
        onReady(e) {
          try { e.target.setVolume(Math.round((vol ?? initialVolume) * 100)); } catch (_) {}
          if (seekSeconds > 0) { try { e.target.seekTo(seekSeconds, true); } catch (_) {} }
          if (autoplayNow) { try { e.target.playVideo(); } catch (_) {} }
        },
        onStateChange(e) {
          if (mode !== "youtube") return;
          updatePlayIcon(e.data === YT.PlayerState.PLAYING);
          if (e.data === YT.PlayerState.ENDED) post("ended", {});
        },
        onError(e) {
          statusEl.textContent = `再生エラーが発生しました（コード ${e.data}）`;
          post("error", { code: e.data });
        },
      },
    });
  }

  /** Switch into (or stay in, with a new video) YouTube-hosting mode. */
  function enterYoutubeMode({ videoId, title: t, artist: a, badge: b, position: pos, volume: vol, autoplay }) {
    mode = "youtube";
    playerHostEl.hidden = false;
    headerText.textContent = "PlatHub ポップアウト再生中";
    setTitle(t); setArtist(a); setBadge(b || "YouTube");
    position = pos || 0; duration = 0; renderProgress(position, duration);

    if (player && typeof player.loadVideoById === "function") {
      try {
        player.loadVideoById(videoId);
        if (pos > 0) player.seekTo(pos, true);
        if (typeof vol === "number") { player.setVolume(Math.round(vol * 100)); volumeSlider.value = Math.round(vol * 100); }
      } catch (_) {}
    } else if (apiReady) {
      reallyEnterYoutube({ videoId, autoplayNow: autoplay !== false, seekSeconds: pos || 0, vol });
    } else {
      pendingEnterYoutube = { videoId, autoplayNow: autoplay !== false, seekSeconds: pos || 0, vol };
    }
  }

  /** Switch into remote-control mode: hide video, stop reporting local
   *  playback (nothing local to report), start relaying commands. */
  function enterRemoteMode({ title: t, artist: a, badge: b, position: pos, duration: dur, playing, volume: vol }) {
    mode = "remote";
    playerHostEl.hidden = true;
    headerText.textContent = "PlatHub 操作パネル — 音声はメイン画面側で再生されています";
    if (player) { try { player.pauseVideo(); } catch (_) {} }
    setTitle(t); setArtist(a); setBadge(b);
    position = pos || 0; duration = dur || 0; playingRemote = !!playing;
    updatePlayIcon(playingRemote);
    if (typeof vol === "number") volumeSlider.value = Math.round(vol * 100);
    renderProgress(position, duration);
  }

  /* ════════════════════════════════════════════
     Controls — behavior depends on the current mode.
  ════════════════════════════════════════════ */
  playPauseBtn.addEventListener("click", () => {
    if (mode === "youtube") {
      if (!player) return;
      try {
        if (player.getPlayerState() === YT.PlayerState.PLAYING) player.pauseVideo();
        else player.playVideo();
      } catch (_) {}
    } else {
      post("togglePlay", {});
    }
  });

  volumeSlider.addEventListener("input", () => {
    if (mode === "youtube") {
      if (player) { try { player.setVolume(+volumeSlider.value); } catch (_) {} }
    } else {
      post("setVolume", { volume: +volumeSlider.value / 100 });
    }
  });

  progressSlider.addEventListener("input", () => {
    seeking = true;
    const pct = +progressSlider.value / 1000;
    const dur = mode === "youtube" ? (player?.getDuration?.() || 0) : duration;
    curTimeEl.textContent = formatTime(pct * dur);
    progressSlider.style.background =
      `linear-gradient(to right, var(--red) ${pct * 100}%, #2a2a3a ${pct * 100}%)`;
  });
  progressSlider.addEventListener("change", () => {
    const pct = +progressSlider.value / 1000;
    if (mode === "youtube") {
      const dur = player?.getDuration?.() || 0;
      if (player && dur > 0) { try { player.seekTo(pct * dur, true); } catch (_) {} }
    } else {
      post("seek", { position: pct * duration });
    }
    seeking = false;
  });

  // Next/Prev always defer to the main window — playlist order (shuffle/
  // repeat/radio) lives there regardless of which mode we're in.
  nextBtn.addEventListener("click", () => post("requestNext", {}));
  prevBtn.addEventListener("click", () => {
    let pos = mode === "youtube" ? (player?.getCurrentTime?.() || 0) : position;
    post("requestPrev", { position: pos });
  });

  // Local progress/position reporting — only meaningful in youtube mode,
  // since remote mode has no local playback to measure (its progress bar
  // is driven entirely by 'state' messages from the main window instead).
  setInterval(() => {
    if (mode !== "youtube" || !player) return;
    let pos = 0, dur = 0, isPlaying = false;
    try {
      pos = player.getCurrentTime() || 0;
      dur = player.getDuration() || 0;
      isPlaying = player.getPlayerState() === YT.PlayerState.PLAYING;
    } catch (_) { return; }
    if (!seeking) renderProgress(pos, dur);
    updatePlayIcon(isPlaying);
    post("position", { position: pos, duration: dur, playing: isPlaying });
  }, 500);

  // Gently tick the remote-mode progress bar between syncs, so it moves
  // smoothly rather than only jumping every ~500ms.
  setInterval(() => {
    if (mode !== "remote" || seeking || !playingRemote || duration <= 0) return;
    position = Math.min(duration, position + 0.5);
    renderProgress(position, duration);
  }, 500);

  window.addEventListener("beforeunload", () => {
    let pos = mode === "youtube" ? (player?.getCurrentTime?.() || 0) : position;
    post("closed", { position: pos });
  });

  /* ════════════════════════════════════════════
     Commands from the main window
  ════════════════════════════════════════════ */
  window.addEventListener("message", (e) => {
    if (e.origin !== window.location.origin) return;
    const data = e.data;
    if (!data || data.source !== "plathub-main") return;

    if (data.type === "enterYoutube") {
      enterYoutubeMode(data);
    } else if (data.type === "enterRemote") {
      enterRemoteMode(data);
    } else if (data.type === "state" && mode === "remote") {
      if (typeof data.title === "string") setTitle(data.title);
      if (typeof data.artist === "string") setArtist(data.artist);
      if (typeof data.badge === "string") setBadge(data.badge);
      if (typeof data.position === "number") position = data.position;
      if (typeof data.duration === "number") duration = data.duration;
      if (typeof data.playing === "boolean") { playingRemote = data.playing; updatePlayIcon(playingRemote); }
      if (typeof data.volume === "number") volumeSlider.value = Math.round(data.volume * 100);
      if (!seeking) renderProgress(position, duration);
    } else if (data.type === "seekLocal" && mode === "youtube" && player) {
      try { player.seekTo(0, true); } catch (_) {}
    }
  });

  // If we're starting in youtube mode, kick off the player as soon as the
  // API is ready (mirrors what enterYoutubeMode would do, but for the
  // very first load rather than a later mode switch).
  if (mode === "youtube") {
    playerHostEl.hidden = false;
    const videoId = params.get("v");
    if (videoId) {
      const kickoff = () => reallyEnterYoutube({
        videoId, autoplayNow: true,
        seekSeconds: position, vol: initialVolume,
      });
      if (apiReady) kickoff(); else pendingEnterYoutube = {
        videoId, autoplayNow: true, seekSeconds: position, vol: initialVolume,
      };
    }
  } else {
    playerHostEl.hidden = true;
    headerText.textContent = "PlatHub 操作パネル — 音声はメイン画面側で再生されています";
    updatePlayIcon(playingRemote);
  }

  post("ready", {});
})();
</script>
</body>
</html>
